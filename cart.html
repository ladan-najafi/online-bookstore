<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart - Online Bookstore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">Online Bookstore</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html#home">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="index.html#books">Books</a></li>
            <li class="nav-item"><a class="nav-link" href="index.html#contact">Contact</a></li>
            <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
            <li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
            <li class="nav-item"><a class="nav-link active" href="cart.html">🛒 Cart <span id="cart-count" class="badge bg-danger">0</span></a></li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Cart Section -->
    <section class="py-5">
      <div class="container">
        <h2 class="mb-4">Your Cart</h2>
        <div id="cart-empty" class="alert alert-info d-none">Your cart is empty. <a href="index.html#books">Browse books</a></div>

        <div class="table-responsive">
          <table class="table table-bordered bg-white" id="cart-table">
            <thead class="table-dark">
              <tr>
                <th>#</th>
                <th>Title</th>
                <th>Author</th>
                <th>Price</th>
                <th>Remove</th>
              </tr>
            </thead>
            <tbody id="cart-body">
            </tbody>
          </table>
        </div>

        <div id="cart-footer" class="text-end">
          <h4>Total: $<span id="cart-total">0.00</span></h4>
          <button class="btn btn-danger" id="clear-cart">Clear Cart</button>
          <a href="index.html#books" class="btn btn-dark">Continue Shopping</a>
        </div>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      let cart = JSON.parse(localStorage.getItem('cart')) || [];

      const cartBody = document.getElementById('cart-body');
      const cartTotal = document.getElementById('cart-total');
      const cartCount = document.getElementById('cart-count');
      const cartEmpty = document.getElementById('cart-empty');
      const cartTable = document.getElementById('cart-table');
      const cartFooter = document.getElementById('cart-footer');

      function renderCart() {
        cartBody.innerHTML = '';
        let total = 0;

        if (cart.length === 0) {
          cartEmpty.classList.remove('d-none');
          cartTable.classList.add('d-none');
          cartFooter.classList.add('d-none');
        } else {
          cartEmpty.classList.add('d-none');
          cartTable.classList.remove('d-none');
          cartFooter.classList.remove('d-none');

          cart.forEach((book, index) => {
            total += book.price;
            cartBody.innerHTML += `
              <tr>
                <td>${index + 1}</td>
                <td>${book.title}</td>
                <td>${book.author}</td>
                <td>$${book.price.toFixed(2)}</td>
                <td><button class="btn btn-sm btn-danger" onclick="removeItem(${index})">Remove</button></td>
              </tr>`;
          });
        }

        cartTotal.textContent = total.toFixed(2);
        cartCount.textContent = cart.length;
      }

      function removeItem(index) {
        cart.splice(index, 1);
        localStorage.setItem('cart', JSON.stringify(cart));
        renderCart();
      }

      document.getElementById('clear-cart').addEventListener('click', () => {
        cart = [];
        localStorage.setItem('cart', JSON.stringify(cart));
        renderCart();
      });

      renderCart();
    </script>
  </body>
</html>
