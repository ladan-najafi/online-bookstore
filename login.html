<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Online Bookstore</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">Online Bookstore</a>
      </div>
    </nav>

    <section class="py-5">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-6">
            <div class="card p-4 shadow-sm">
              <h2 class="text-center mb-4">Login</h2>

              <!--<form>
                <div class="mb-3">
                  <label class="form-label">Email</label>
                  <input type="email" class="form-control" placeholder="Enter your email" />
                </div>

                <div class="mb-3">
                  <label class="form-label">Password</label>
                  <input type="password" class="form-control" placeholder="Enter your password" />
                </div>

                <button type="submit" class="btn btn-primary w-100">Login</button>
              </form>-->
              <!-- Added form validation and IDs for JavaScript handling -->
              
              <form id="loginForm" novalidate>
                <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="loginEmail" class="form-control" placeholder="Enter your email" required />
                <div class="invalid-feedback">Please enter a valid email address.</div>
                </div>

                <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="loginPassword" class="form-control" placeholder="Enter your password" required minlength="6" />
                <div class="invalid-feedback">Password must be at least 6 characters.</div>
                </div>

              <button type="submit" class="btn btn-primary w-100">Login</button>
              </form>
              <p class="text-center mt-3 mb-0">
                Don’t have an account?
                <a href="register.html">Register here</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
     <script>
  document.getElementById('loginForm').addEventListener('submit', function (e) {
    e.preventDefault();
    if (!this.checkValidity()) {
      this.classList.add('was-validated');
    } else {
      alert('Login successful!');
      // alert  message
    }
  });
</script>

  </body>
</html>
