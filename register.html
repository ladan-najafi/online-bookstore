              <!-- Added form validation and IDs for JavaScript handling -->
    <form id="registerForm" novalidate>
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" id="fullName" class="form-control" placeholder="Enter your full name" required minlength="3" />
          <div class="invalid-feedback">Please enter your full name (at least 3 characters).</div>
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" id="regEmail" class="form-control" placeholder="Enter your email" required />
          <div class="invalid-feedback">Please enter a valid email address.</div>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" id="regPassword" class="form-control" placeholder="Create a password" required minlength="6" />
          <div class="invalid-feedback">Password must be at least 6 characters.</div>
        </div>

        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm your password" required />
          <div class="invalid-feedback">Passwords do not match.</div>
        </div>

    <button type="submit" class="btn btn-primary w-100">Register</button>
</form>



              <p class="text-center mt-3 mb-0">
                Already have an account?
                <a href="login.html">Login here</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
  document.getElementById('registerForm').addEventListener('submit', function (e) {
    e.preventDefault();

    const password = document.getElementById('regPassword');
    const confirm = document.getElementById('confirmPassword');

    // Check if passwords match
    if (password.value !== confirm.value) {
      confirm.setCustomValidity('Passwords do not match.');
    } else {
      confirm.setCustomValidity('');
    }

    if (!this.checkValidity()) {
      this.classList.add('was-validated');
    } else {
      alert('Registration successful!');
      //  alert message
    }
  });
</script>
