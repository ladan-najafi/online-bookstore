<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Online Bookstore</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header>
      <h1>Online Bookstore</h1>
      <p>Welcome to our online bookstore.</p>
    </header>
    <main>
      <h2>Featured Books</h2>
      <p>Here you can find some of our popular books.</p>
      <button>View Books</button>

      <div class="book-list">
        <section>
          <h3>Book 1</h3>
          <p>Author: John Smith</p>
          <p>Price: $19.99</p>
        </section>

        <section>
          <h3>Book 2</h3>
          <p>Author: Jane Doe</p>
          <p>Price: $24.99</p>
        </section>

        <section>
          <h3>Book 3</h3>
          <p>Author: Mark Lee</p>
          <p>Price: $18.50</p>
        </section>
      </div>
    </main>
    <footer>
      <p>Online Bookstore - 2026</p>
    </footer>
  </body>
</html>
